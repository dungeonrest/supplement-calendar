<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>영양제 달력</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="style.css" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="영양제 달력">
  <link rel="apple-touch-icon" href="icons/192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />

  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
</head>
<body>

<div class="calendar-wrapper">

<header class="calendar-header no-double-tap-zoom">
  <span id="monthDisplay" class="month-display"></span>
  <div class="header-right-group no-double-tap-zoom">
    <button id="monthlyCostBtn" class="monthly-cost-btn icon-btn">
  <span class="won-icon"></span>
</button>
<button id="statsBtn" class="stats-btn icon-btn">
  <span class="bar-1"></span>
  <span class="bar-2"></span>
  <span class="bar-3"></span>
</button>
    <button id="themeToggle" class="theme-btn icon-btn">
  <span class="theme-icon"></span>
</button>
  </div>
</header>

<div class="day-labels">
  <div class="day sun">일</div>
  <div class="day">월</div>
  <div class="day">화</div>
  <div class="day">수</div>
  <div class="day">목</div>
  <div class="day">금</div>
  <div class="day sat">토</div>
</div>

<div id="dates-wrapper">
  <div id="dates" class="dates-container"></div>
</div>

<div id="familyConfigModal" class="modal-overlay hidden" style="background-color: var(--bg-color); align-items: flex-start; padding-top: 100px;">
  <div class="onboarding-container">
    <div class="onboarding-header">
      <span class="emoji-badge">💊</span>
      <h1>반가워요!<br>누구와 함께 복용하나요?</h1>
      <p>이름을 쉼표로 구분해서 적어주세요.</p>
          </div>

    <div class="onboarding-body">
      <input type="text" id="familyInput" placeholder="철수, 엄마, 아빠" autocomplete="off">
      <div class="onboarding-notice">
        <p>이름은 나중에 언제든 바꿀 수 있어요.</p>
        <p>최소 1명에서 최대 4명까지 입력해주세요.</p>
        <p>통계에서 이름을 길게 눌러 변경할 수 있습니다.</p>        
      </div>
    </div>

    <div class="onboarding-footer">
      <button id="saveFamilyConfig" class="primary-btn">시작하기</button>
    </div>
  </div>
</div>

<!-- 하단 작은 백업/복원 링크 -->
<div id="footerBackupArea" class="footer-backup-area">
  <span id="footerVersion" class="footer-version">© <span id="footerYear"></span> <span id="footerAppVersion"></span></span>
  <span id="footerBackupLink" class="footer-backup-link">백업/복원</span>
</div>

<!-- 숨겨진 백업/복원 메뉴 -->
<div id="backupMenuModal" class="modal-overlay hidden">
  <div class="modal backup-menu-modal">
    <div class="modal-header">
      <h3>설정</h3>
      <button id="closeBackupMenu" class="close-btn right"></button>
    </div>
    <button id="exportBtn" class="menu-btn">백업</button>
    <button id="triggerImportBtn" class="menu-btn">복원</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none;" />
  </div>
</div>

<!-- 모달들 -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <button id="saveInfo" class="check-btn left"></button>
      <h3>영양제 정보</h3>
      <button id="closeModal" class="close-btn right"></button>
    </div>
    <div id="modalBody">
  <input type="date" id="inputDate" class="my-date input-date">
  <div class="color-picker-container">
    <div id="colorBar" class="custom-color-bar" style="position: relative;">
      <div class="color-info">
        <div id="colorDot" class="color-dot"></div>
        <span id="colorHexText">자동 색상</span>
      </div>
      <input type="color" id="inputColor" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
    </div>
  </div>

  <input type="text" id="inputProduct" placeholder="제품명" class="product-name input-product">
  <div class="input-combined-group">
    <input type="text" id="inputPrice" placeholder="가격" inputmode="numeric">
    <span class="unit-won">원</span>
  </div>

  <div class="input-combined-group">
    <input type="text" id="inputTotal" placeholder="제공량" inputmode="numeric">
    <select id="inputUnit" class="unit-select-inside">
      <option value="캡슐">캡슐</option>
      <option value="정">정</option>
      <option value="g">g</option>
    </select>
  </div>
  <div class="input-combined-group">
    <input type="text" id="inputDose" placeholder="복용량" inputmode="numeric">
    <span id="unitDisplay">캡슐</span>
  </div>
</div>

      <div class="checkbox-line">
        <label class="checkbox-item">
          <input type="checkbox" class="inputFamily" value="도림">
          <span class="checkbox-label-text">도림</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" class="inputFamily" value="뚜임">
          <span class="checkbox-label-text">뚜임</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" class="inputFamily" value="진이">
          <span class="checkbox-label-text">진이</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" class="inputFamily" value="쿤이">
          <span class="checkbox-label-text">쿤이</span>
        </label>
      </div>

      <div class="checkbox-line">
        <label class="checkbox-item">
          <input type="checkbox" class="inputTime" value="아침">
          <span class="checkbox-label-text">아침</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" class="inputTime" value="점심">
          <span class="checkbox-label-text">점심</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" class="inputTime" value="저녁">
          <span class="checkbox-label-text">저녁</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" class="inputTime" value="공복">
          <span class="checkbox-label-text">공복</span>
        </label>
      </div>

    <div class="modal-footer-btns">
  <span id="deleteSupplement" class="delete-text-btn">삭제</span>
</div>
</div>
  </div>
</div> </div>

<div id="monthlyCostModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header cost-header">
      <h3 id="monthlyCostTitle"></h3>
      <div style="width:35px;"></div>
      <button id="closeMonthlyCostModal" class="close-btn right"></button>
      </div>
    <div id="monthlyCostContent"></div>
  </div>
</div>

<!-- 복용 체크 모달 -->
<div id="takenCheckModal" class="modal-overlay hidden">
  <div class="modal taken-modal">
    <div class="modal-header">
      <h3 id="takenCheckTitle"></h3>
      <div style="width:35px;"></div>
      <button id="closeTakenCheckBtn" class="close-btn right"></button>
    </div>
    <div id="takenCheckBody"></div>

  </div>
</div>

<!-- 통계 모달 -->
<div id="statsModal" class="modal-overlay hidden">
  <div class="modal stats-modal">
    <div class="modal-header">
      <h3>통계</h3>
      <div style="width:35px;"></div>
      <button id="closeStatsModal" class="close-btn right"></button>
    </div>

    <div id="statsFilters">
      <div class="family-buttons">
        <button class="family-btn" data-name="도림">도림</button>
        <button class="family-btn" data-name="뚜임">뚜임</button>
        <button class="family-btn" data-name="진이">진이</button>
        <button class="family-btn" data-name="쿤이">쿤이</button>
      </div>

      <!-- 기간 선택: 월 선택 UI -->
      <div class="period-select" style="display: none;">
        <input type="month" id="periodStart" />
        <input type="month" id="periodEnd" />
      </div>
    </div>

    <div id="statsContent"></div>
  </div>
</div>

<!-- Floating Add Button -->
<button id="fabTodayBtn" class="fab-today-btn">오늘</button>
<button id="fabAddBtn" class="fab-add-btn">＋</button>

<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => {
          console.log('서비스 워커 등록 성공!');
         
          reg.update(); 
        })
        .catch(err => console.log('서비스 워커 등록 실패:', err));
    });

    window.addEventListener('focus', async () => {
      const registration = await navigator.serviceWorker.ready;
      await registration.update();
    });
  }
</script>

</body>
</html>
