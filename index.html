<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>영양제 달력</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="style.css" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="영양제 달력">
  <link rel="apple-touch-icon" href="icons/192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />

  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
</head>
<body>

<div class="calendar-wrapper">

<header class="calendar-header no-double-tap-zoom">
  <span id="monthDisplay" class="month-display"></span>
  <div class="header-right-group no-double-tap-zoom" tabindex="0">
    <button id="monthlyCostBtn" class="monthly-cost-btn icon-btn">
  <span class="won-icon"></span>
</button>
<button id="statsBtn" class="stats-btn icon-btn">
  <span class="bar-1"></span>
  <span class="bar-2"></span>
  <span class="bar-3"></span>
</button>
    <button id="themeToggle" class="theme-btn icon-btn">
  <span class="theme-icon"></span>
</button>
  </div>
</header>

<div class="day-labels">
  <div class="day sun">일</div>
  <div class="day">월</div>
  <div class="day">화</div>
  <div class="day">수</div>
  <div class="day">목</div>
  <div class="day">금</div>
  <div class="day sat">토</div>
</div>

<div id="dates-wrapper">
  <div id="dates" class="dates-container"></div>
</div>

<div id="familyConfigModal" class="modal-overlay hidden" style="background-color: var(--bg-color); align-items: flex-start; padding-top: 100px;">
  <div class="onboarding-container">
    <div class="onboarding-header">
      <span class="emoji-badge">💊</span>
      <h1>반가워요!<br>누구와 함께 복용하나요?</h1>
      <p>이름을 쉼표로 구분해서 적어주세요.</p>
          </div>

    <div class="onboarding-body">
      <input type="text" id="familyInput" placeholder="철수, 엄마, 아빠" autocomplete="off">
      <div class="onboarding-notice">
        <p>이름은 나중에 언제든 바꿀 수 있어요.</p>
        <p>최소 1명에서 최대 4명까지 입력해주세요.</p>     
      </div>
    </div>

    <div class="onboarding-footer">
      <button id="saveFamilyConfig" class="primary-btn">시작하기</button>
    </div>
  </div>
</div>

<div id="footerBackupArea" class="footer-backup-area">
  <span id="footerVersion" class="footer-version">© <span id="footerYear"></span> <span id="footerAppVersion"></span></span>
  <span id="footerBackupLink" class="footer-backup-link">백업/복원</span>
</div>

<div id="backupMenuModal" class="modal-overlay hidden">
  <div class="modal backup-menu-modal">
    <div class="modal-header">
      <h3>설정</h3>
      <button id="closeBackupMenu" class="close-btn right"><span></span></button>
    </div>
    <button id="exportBtn" class="menu-btn">백업</button>
    <button id="triggerImportBtn" class="menu-btn">복원</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none;" />
  </div>
</div>

<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <button id="saveInfo" class="check-btn left"></button>
      <h3>영양제</h3>
      <button id="closeModal" class="close-btn right"><span></span></button>
    </div>
    
    <div id="modalBody">
      <div class="memo-paper-group info-group">
        <div class="info-row split">
          <div class="info-col">
            <input type="date" id="inputDate" class="memo-line-style">
          </div>
          <div class="info-divider-vertical"></div>
          <div class="info-col">
            <div id="colorBar" class="custom-color-bar">
              <div class="color-info">
                <div id="colorDot" class="color-dot"></div>
                <span id="colorHexText">자동 색상</span>
              </div>
              <input type="color" id="inputColor">
            </div>
          </div>
        </div>
      </div>

      <label class="input-label">기본 정보</label>
      <div class="memo-paper-group info-group">
        <div class="info-row">
          <span class="row-label">제품명</span>
          <input type="text" id="inputProduct" class="memo-line-style" placeholder="">
          <span class="unit-placeholder"></span>
        </div>
        <div class="memo-divider"></div>

        <div class="info-row">
          <span class="row-label">가격</span>
          <input type="text" id="inputPrice" class="memo-line-style" placeholder="" inputmode="numeric">
          <span class="unit-text">원</span>
        </div>
        <div class="memo-divider"></div>

        <div class="info-row">
          <span class="row-label">제공량</span>
          <input type="text" id="inputTotal" class="memo-line-style" placeholder="" inputmode="numeric">
          <select id="inputUnit" class="unit-select-inside">
            <option value="캡슐">캡슐</option>
            <option value="정">정</option>
            <option value="g">g</option>
          </select>
        </div>
        <div class="memo-divider"></div>

        <div class="info-row">
          <span class="row-label">복용량</span>
          <input type="text" id="inputDose" class="memo-line-style" placeholder="" inputmode="numeric">
          <span id="unitDisplay" class="unit-text">캡슐</span>
        </div>
      </div>

      <label class="input-label">대상 및 시간</label>
      <div class="memo-paper-group checkbox-group">
        <div class="checkbox-line-row">
          <label class="checkbox-item"><input type="checkbox" class="inputFamily" value="도림"><span class="checkbox-label-text">도림</span></label>
          <label class="checkbox-item"><input type="checkbox" class="inputFamily" value="뚜임"><span class="checkbox-label-text">뚜임</span></label>
          <label class="checkbox-item"><input type="checkbox" class="inputFamily" value="진이"><span class="checkbox-label-text">진이</span></label>
          <label class="checkbox-item"><input type="checkbox" class="inputFamily" value="쿤이"><span class="checkbox-label-text">쿤이</span></label>
        </div>
        <div class="memo-divider"></div>
        <div class="checkbox-line-row">
          <label class="checkbox-item"><input type="checkbox" class="inputTime" value="아침"><span class="checkbox-label-text">아침</span></label>
          <label class="checkbox-item"><input type="checkbox" class="inputTime" value="점심"><span class="checkbox-label-text">점심</span></label>
          <label class="checkbox-item"><input type="checkbox" class="inputTime" value="저녁"><span class="checkbox-label-text">저녁</span></label>
          <label class="checkbox-item"><input type="checkbox" class="inputTime" value="공복"><span class="checkbox-label-text">공복</span></label>
        </div>
      </div>

      <div class="memo-container">
        <label class="input-label">메모</label>
        <div class="memo-paper-group">
          <input type="text" id="memoLine1" class="memo-line" placeholder="" autocomplete="off">
          <div class="memo-divider"></div>
          <input type="text" id="memoLine2" class="memo-line" placeholder="" autocomplete="off">
          <div class="memo-divider"></div>
          <input type="text" id="memoLine3" class="memo-line" placeholder="" autocomplete="off">
        </div>
      </div>

      <div class="delete-btn-container">
        <button id="deleteInfoBtn" class="delete-glass-btn">영양제 삭제</button>
      </div>
    </div> </div> </div>

<div id="takenCheckModal" class="modal-overlay hidden">
  <div class="modal taken-modal">
    <div class="modal-header">
      <h3 id="takenCheckTitle"></h3>
      <div style="width:35px;"></div>
      <button id="closeTakenCheckBtn" class="close-btn right"><span></span></button>
    </div>
    <div id="takenCheckBody"></div>

  </div>
</div>

<div id="monthlyCostModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header cost-header">
      <div class="tab-container" id="costTabContainer">
        <div class="tab-slider"></div>
        <button class="tab-btn active" onclick="switchCostTab('cost')">비용</button>
        <button class="tab-btn" onclick="switchCostTab('calc')">계산</button>
      </div>
      <button id="closeMonthlyCostModal" class="close-btn right"><span></span></button>
    </div>
    <div id="monthlyCostContent"></div>
    <div id="calcTabContent" style="display:none;"></div>
  </div>
</div>

<div id="statsModal" class="modal-overlay hidden">
  <div class="modal stats-modal">
    <div class="modal-header">
      <div class="tab-container" id="statsTabContainer">
        <div class="tab-slider"></div>
        <button class="tab-btn active" onclick="switchStatsTab('stats')">통계</button>
        <button class="tab-btn" onclick="switchStatsTab('period')">기간</button>
      </div>
      <button id="closeStatsModal" class="close-btn right"><span></span></button>
    </div>

    <div id="statsFilters">
      <div id="familyBtnsWrapper" class="family-buttons">
        </div>

      <div id="periodWrapper" class="period-select-container" style="display: none;">
        <div class="period-input-group">
          <label>시작</label>
          <input type="month" id="periodStart" />
        </div>
        <div class="period-input-group">
          <label>종료</label>
          <input type="month" id="periodEnd" />
        </div>
        <p class="period-info">기간을 설정한 후 다시 '통계' 탭을 눌러주세요.</p>
      </div>
    </div>

    <div id="statsContent"></div>
  </div>
</div>

<div id="yearlyModal" class="modal-overlay hidden yearly-mode">
  <div class="modal yearly-modal">
    <div class="modal-header">
      <h3 id="yearlyTitle">2026년</h3>
      <button id="closeYearlyModal" class="close-btn right"><span></span></button>
    </div>
    <div id="yearlyContent" class="yearly-grid">
      </div>
  </div>
</div>


<button id="fabTodayBtn" class="fab-today-btn">오늘</button>
<button id="fabAddBtn" class="fab-add-btn"></button>

<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => {
          console.log('서비스 워커 등록 성공!');
         
          reg.update(); 
        })
        .catch(err => console.log('서비스 워커 등록 실패:', err));
    });

    window.addEventListener('focus', async () => {
      const registration = await navigator.serviceWorker.ready;
      await registration.update();
    });
  }
</script>

</body>
</html>
